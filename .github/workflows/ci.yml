name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project
        run: python -m pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Run deterministic demo
        run: |
          set +e
          mission-revoker demo --json > demo-report.json
          status=$?
          test "$status" -eq 2
          python -m json.tool demo-report.json > /dev/null
